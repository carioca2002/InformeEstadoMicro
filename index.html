<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Salidas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
		body {background: linear-gradient(135deg, #0a0a0b, #111827);}
		
        :root { --bg: #0a0a0b; --row-bg: #1a1a1c; --accent: #facc15; --text: #ffffff; }        
        
		header {
			background: rgba(0,0,0,0.7);
			backdrop-filter: blur(10px);
			border-bottom: 2px solid rgba(255,255,255,0.1);
		}
		
        .clock { font-size: 3rem; font-weight: bold; color: var(--accent); }

		table {
			max-width: 1400px;
			margin: auto;
		}
        th { text-transform: uppercase; color: #888; font-size: 1.2rem; padding: 10px; text-align: left; }
        
		td {
			padding: 20px;
			font-size: 1.8rem;
			background: rgba(255,255,255,0.03);
			backdrop-filter: blur(6px);
			border-radius: 10px;
		}
        
		tr:hover td {
			background: rgba(255,255,255,0.08);
			transition: 0.3s;
		}
		
        .hora { font-weight: bold; color: var(--accent); width: 10%; }
        .destino { width: 35%; text-transform: uppercase; }
        .empresa { width: 25%; color: #ccc; }
        .plat { text-align: center; font-size: 2.5rem; font-weight: bold; width: 10%; }
        .estado { width: 20%; font-weight: bold; text-align: center; border-radius: 5px; }

        /* Estados dinámicos */

		.embarcando {
			background: linear-gradient(90deg, #166534, #22c55e);
			color: #fff;
			animation: pulse 1.5s infinite;
		}

		.demorado {
			background: linear-gradient(90deg, #7f1d1d, #ef4444);
			color: #fff;
		}

		.atiempo {
			background: linear-gradient(90deg, #1e3a8a, #3b82f6);
			color: #fff;
		}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div style="font-size: 2.5rem; font-weight: bold;">SALIDAS / DEPARTURES</div>
    <div id="reloj" class="clock">00:00</div>
</header>

<table id="tabla-salidas">
    <thead>
        <tr>
            <th>Hora</th>
            <th>Destino</th>
            <th>Empresa</th>
            <th style="text-align: center;">Plat.</th>
            <th style="text-align: center;">Estado</th>
        </tr>
    </thead>
    <tbody id="lista-micros">
        </tbody>
</table>

<script>
    // 1. REEMPLAZA ESTE LINK por el de tu Google Sheet (Publicado como CSV)
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDS6gxnJVS8_yPy99iLFENVzx72Ybvra_kXsJpqqe4tQzDFg4wgdkogY8t0qceLpSCh2Ygxo8Xb-d1/pub?gid=0&single=true&output=csv';

    function actualizarReloj() {
        const ahora = new Date();
        document.getElementById('reloj').textContent = ahora.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

	// Reemplaza con la URL que copiaste en el paso anterior
	// const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwgt420cMHLw3ecrCs2nlaq1gJMbMfxV08kejIz7Uzy3XQ5UJ5y7qvWTn8bMR8sMKbutg/exec';

	// Agregamos un prefijo que "limpia" la seguridad para el navegador
	const WEB_APP_URL = 'https://cors-proxy.fringe.zone/https://script.google.com/macros/s/AKfycbwgt420cMHLw3ecrCs2nlaq1gJMbMfxV08kejIz7Uzy3XQ5UJ5y7qvWTn8bMR8sMKbutg/exec';

	async function cargarDatos() {
		console.log("Cargando datos desde CSV...");

		Papa.parse(CSV_URL, {
			download: true,
			header: true,
			complete: function(results) {
				const data = results.data; // 👈 ACÁ están los datos reales
				console.log("Datos recibidos:", data);
				renderizarTabla(data);
			},
			error: function(err) {
				console.error("Error al obtener datos:", err);
			}
		});
	}

	// El resto de la función renderizarTabla se mantiene igual, 
	// solo asegúrate de que use los nombres de columna de tu Excel.

	function renderizarTabla(datos) {
		const tbody = document.getElementById('lista-micros');
		tbody.innerHTML = '';

function renderizarTabla(datos) {
	    const tbody = document.getElementById('lista-micros');
	    tbody.innerHTML = '';
	
		// 🧠 Orden personalizado
		const prioridadEstado = {
			"embarcando": 1,
			"enplataforma": 1,
			"atiempo": 2,
			"salio": 2,
			"demorado": 3
		};

		datos.sort((a, b) => {
			const estadoA = (a.ESTADO || "").toLowerCase().replace(/\s/g, "");
			const estadoB = (b.ESTADO || "").toLowerCase().replace(/\s/g, "");
	
			const prioridadA = prioridadEstado[estadoA] || 99;
			const prioridadB = prioridadEstado[estadoB] || 99;
	
			// Primero por estado
			if (prioridadA !== prioridadB) {
				return prioridadA - prioridadB;
			}
	
			// Luego por hora
			const horaA = (a.HORA || "00:00");
			const horaB = (b.HORA || "00:00");
	
			return horaA.localeCompare(horaB);
		});
		
		datos.forEach(micro => {
			// Buscamos las llaves sin importar si son mayúsculas o minúsculas
			const hora = micro.HORA || micro.Hora || micro.hora || "--:--";
			const destino = micro.DESTINO || micro.Destino || micro.destino || "Sin Destino";
			const empresa = micro.EMPRESA || micro.Empresa || micro.empresa || "---";
			const plat = micro.PLAT || micro.Plat || micro.Plataforma || "-";
			const estadoRaw = micro.ESTADO || micro.Estado || micro.estado || "A tiempo";
			
			const claseEstado = estadoRaw.toLowerCase().replace(/\s/g, "");
	
			const fila = `
				<tr>
					<td class="hora">${hora}</td>
					<td class="destino">${destino}</td>
					<td class="empresa">${empresa}</td>
					<td class="plat">${plat}</td>
					<td><div class="estado ${claseEstado}">${estadoRaw}</div></td>
				</tr>
			`;
			tbody.innerHTML += fila;
		});
	}

    setInterval(actualizarReloj, 1000);
    setInterval(cargarDatos, 60000); // Actualiza datos cada 1 minuto
    cargarDatos();
</script>

</body>
</html>
